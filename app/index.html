<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Visual Proof Assistant</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #fafaf7; }
      canvas { display: block; }
      #chrome {
        position: fixed; top: 8px; left: 8px; right: 8px;
        font: 13px sans-serif; color: #222;
        display: flex; flex-direction: column; gap: 4px;
        pointer-events: none;
        z-index: 10;
      }
      #chrome > div { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; pointer-events: auto; }
      #chrome input[type="text"] { min-width: 18em; }
      #status { background: rgba(255, 255, 255, 0.85); padding: 2px 6px; border-radius: 3px; }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div id="chrome"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
